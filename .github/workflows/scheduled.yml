name: Scheduled Python Script

on:
  schedule:
    - cron: '59 15 * * *' # 每天國際標準時間 00:00 (台灣時間 08:00)
  workflow_dispatch: # 允許手動觸發

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run script
        run: python pm25.py
        env:
            HOST: ${{ secrets.HOST }}
            PORT: ${{ secrets.PORT }}
            USER: ${{ secrets.USER }}
            PASSWORD: ${{ secrets.PASSWORD }}
            NAME: ${{ secrets.NAME }}